<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Centro Médico</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f2f2f2;
        }

        /* NAVBAR */
        .navbar {
            background-color: #ffffff;
            padding: 15px 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .navbar a {
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
            color: #333;
        }

        .navbar a:hover {
            color: #007bff;
        }

        /* CONTENEDOR */
        .container {
            width: 85%;
            margin: 40px auto;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
        }

        /* BOTONES */
        .btn {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            margin-right: 5px;
        }

        .btn-primary {
            background-color: #007bff;
            color: white;
        }

        .btn-warning {
            background-color: #ffc107;
            color: black;
        }

        .btn-danger {
            background-color: #dc3545;
            color: white;
        }

        .btn:hover {
            opacity: 0.85;
        }

        /* TABLAS */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table th {
            background-color: #007bff;
            color: white;
            padding: 10px;
            text-align: left;
        }

        table td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        table tr:hover {
            background-color: #f9f9f9;
        }

        /* ALERTAS */
        .flash {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            background-color: #e9ecef;
        }
    </style>
</head>

<body>

{% if session.get("user_id") %}
<div class="navbar">
    <a href="{{ url_for('routes.dashboard') }}">🏠 Dashboard</a>
    <a href="{{ url_for('patients.index') }}">Pacientes</a>
    <a href="{{ url_for('users.index') }}">Usuarios</a>
    <a href="{{ url_for('roles.index') }}">Roles</a>
    <a href="{{ url_for('auth.logout') }}">Cerrar sesión</a>
</div>
{% endif %}

<div class="container">
    <div class="card">

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="flash">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}

    </div>
</div>

</body>
</html>
