<!DOCTYPE html>
<html>
<head>
    <title>Sistema Centro Médico</title>
</head>
<body>

<h1>Sistema Centro Médico</h1>

<hr>

<!-- MENSAJES -->
{% with messages = get_flashed_messages() %}
{% if messages %}
    <div style="background:#eee;padding:10px;margin-bottom:10px;">
        {% for msg in messages %}
            <p>{{ msg }}</p>
        {% endfor %}
    </div>
{% endif %}
{% endwith %}

{% block content %}
{% endblock %}

</body>
</html>
