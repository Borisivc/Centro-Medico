<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Sistema Centro Médico</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.sidebar{
height:100vh;
background:#0d6efd;
color:white;
}

.sidebar a{
color:white;
text-decoration:none;
display:block;
padding:12px;
}

.sidebar a:hover{
background:#084298;
}

.content{
padding:30px;
}

.card-dashboard{
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->

<div class="col-md-2 sidebar">

<h4 class="p-3">Centro Médico</h4>

<a href="{{ url_for('routes.dashboard') }}">
<i class="bi bi-house"></i> Dashboard
</a>

<a href="{{ url_for('patients.index') }}">
<i class="bi bi-people"></i> Pacientes
</a>

<a href="{{ url_for('professionals.index') }}">
<i class="bi bi-person-badge"></i> Profesionales
</a>

<a href="{{ url_for('users.index') }}">
<i class="bi bi-person"></i> Usuarios
</a>

<a href="{{ url_for('roles.index') }}">
<i class="bi bi-shield"></i> Roles
</a>

<a href="{{ url_for('auth.logout') }}">
<i class="bi bi-box-arrow-right"></i> Cerrar sesión
</a>

</div>

<!-- CONTENIDO -->

<div class="col-md-10 content">

{% with messages = get_flashed_messages() %}
{% if messages %}
{% for m in messages %}

<div class="alert alert-success">
{{ m }}
</div>

{% endfor %}
{% endif %}
{% endwith %}

{% block content %}{% endblock %}

</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
