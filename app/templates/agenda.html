{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header d-flex justify-content-between align-items-center">

<h5 class="mb-0">
Agenda
</h5>

<button
class="btn btn-primary btn-sm"
data-bs-toggle="modal"
data-bs-target="#modalCreate">

Crear

</button>

</div>


<div class="card-body">

<table class="table table-bordered table-hover">

<thead class="table-light">

<tr>
<th>ID</th>
<th>Paciente</th>
<th>Profesional</th>
<th>Fecha</th>
<th>Hora</th>
<th width="120">Acciones</th>
</tr>

</thead>

<tbody>

{% for a in citas %}

<tr>

<td>{{a.id}}</td>
<td>{{a.paciente}}</td>
<td>{{a.profesional}}</td>
<td>{{a.fecha}}</td>
<td>{{a.hora}}</td>

<td>

<form
method="POST"
action="{{ url_for('agenda.delete', id=a.id) }}"
style="display:inline;">

<button
class="btn btn-danger btn-sm"
onclick="return confirm('¿Eliminar cita?')">

Eliminar

</button>

</form>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>



<!-- MODAL CREAR CITA -->

<div class="modal fade" id="modalCreate">

<div class="modal-dialog">

<div class="modal-content">

<form method="POST" action="{{ url_for('agenda.create') }}">

<div class="modal-header">

<h5 class="modal-title">
Crear Cita
</h5>

<button
type="button"
class="btn-close"
data-bs-dismiss="modal">

</button>

</div>


<div class="modal-body">

<input
class="form-control mb-2"
name="paciente_id"
placeholder="ID Paciente"
required>

<input
class="form-control mb-2"
name="profesional_id"
placeholder="ID Profesional"
required>

<input
type="date"
class="form-control mb-2"
name="fecha"
required>

<input
type="time"
class="form-control mb-2"
name="hora"
required>

</div>


<div class="modal-footer">

<button
type="submit"
class="btn btn-primary">

Crear

</button>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
