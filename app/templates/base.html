<!DOCTYPE html>
<html>

<head>
<title>Centro Médico</title>
</head>

<body>

<h1>Sistema Centro Médico</h1>

<hr>

{% with messages = get_flashed_messages() %}
{% if messages %}

<ul>

{% for message in messages %}
<li style="color:green">{{ message }}</li>
{% endfor %}

</ul>

{% endif %}
{% endwith %}

{% block content %}
{% endblock %}

</body>

</html>
