{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header">

<h5 class="mb-0">
Estados Agenda
</h5>

</div>


<div class="card-body">

<table class="table table-bordered table-hover">

<thead class="table-light">

<tr>
<th>ID</th>
<th>Nombre</th>
</tr>

</thead>

<tbody>

{% for s in states %}

<tr>

<td>{{s.id}}</td>
<td>{{s.nombre}}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

{% endblock %}
