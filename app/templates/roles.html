{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="row align-items-center mb-4">
        <div class="col-md-8 text-start">
            <h2 class="text-navy-centro fw-bold m-0">Roles de Sistema</h2>
            <p class="text-muted small mb-0 fw-bold text-uppercase">Perfiles de Acceso</p>
        </div>
        <div class="col-md-4 text-end">
            <button class="btn-nuevo-centro shadow-sm" data-bs-toggle="modal" data-bs-target="#modalRol" onclick="nuevoRol()">
                NUEVO
            </button>
        </div>
    </div>

    <div class="card p-4 border-0 shadow-sm rounded-4">
        <div class="table-responsive-scroll">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th>Nombre del Rol</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for r in roles %}
                    <tr class="border-bottom">
                        <td class="fw-bold text-navy-centro text-uppercase small">{{ r.get('nombre', '') }}</td>
                        <td class="text-center">
                            <button class="btn-editar-centro me-1 shadow-sm" onclick="editarRol(this)" 
                                data-id="{{ r.get('id', '') }}" data-nom="{{ r.get('nombre', '') }}">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-eliminar-centro shadow-sm" onclick="confirmarEliminar('{{ r.get('id', '') }}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                    {% else %}
                    <tr><td colspan="2" class="text-center py-5 text-muted small fst-italic">No hay roles registrados.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        
        <nav class="mt-4">
            <ul class="pagination pagination-sm justify-content-end mb-0">
                <li class="page-item disabled"><a class="page-link text-muted border-0 fw-bold" href="#">Anterior</a></li>
                <li class="page-item active"><a class="page-link bg-navy-centro border-0 text-white rounded-circle mx-1" href="#">1</a></li>
                <li class="page-item"><a class="page-link text-navy-centro border-0 fw-bold" href="#">Siguiente</a></li>
            </ul>
        </nav>
    </div>
</div>

<div class="modal fade" id="modalRol" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4 p-2">
            <div class="modal-header border-0 pb-0 pt-4 px-4 position-relative text-center">
                <div class="w-100"><h4 class="modal-centro-title m-0 fw-bold fs-5 text-navy-centro" id="titleRol">Rol</h4></div>
                <button type="button" class="btn-close position-absolute end-0 top-0 m-3" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4 pt-3">
                <form action="{{ url_for('roles.save') }}" method="POST" id="formRol">
                    <input type="hidden" name="id" id="rol_id">
                    <div class="mb-4">
                        <label class="label-centro fw-bold x-small text-muted ms-2">Nombre del Rol</label>
                        <input type="text" name="nombre" id="rol_nom" class="form-control-centro w-100 text-uppercase" required>
                    </div>
                    <div class="d-grid mt-2">
                        <button type="submit" class="btn-centro-confirm shadow-sm">GUARDAR ROL</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function nuevoRol(){
        document.getElementById('formRol').reset();
        document.getElementById('rol_id').value = '';
        document.getElementById('titleRol').innerText = 'Nuevo Rol';
    }
    function editarRol(btn){
        nuevoRol();
        document.getElementById('rol_id').value = btn.dataset.id;
        document.getElementById('rol_nom').value = btn.dataset.nom;
        document.getElementById('titleRol').innerText = 'Editar Rol';
        var myModal = new bootstrap.Modal(document.getElementById('modalRol'));
        myModal.show();
    }
    function confirmarEliminar(id) {
        Swal.fire({
            title: '¿Eliminar Rol?', icon: 'warning', showCancelButton: true,
            confirmButtonText: 'ELIMINAR', customClass: { confirmButton: 'btn btn-danger rounded-pill px-4 fw-bold me-2', cancelButton: 'btn btn-light rounded-pill px-4 fw-bold border' }, buttonsStyling: false
        }).then((result) => {
            if (result.isConfirmed) { window.location.href = "{{ url_for('roles.delete', id=0) }}".replace('0', id); }
        });
    }
</script>
{% endblock %}
