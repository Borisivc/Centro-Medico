{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="row align-items-center mb-4">
        <div class="col-md-8">
            <h2 class="modal-integra-title text-start m-0">Gestor de Pacientes</h2>
            <p class="text-muted small mb-0 fw-bold text-uppercase">Base de datos de alumnos y pacientes</p>
        </div>
        <div class="col-md-4 text-end">
            <button type="button" class="btn-nuevo-integra" data-bs-toggle="modal" data-bs-target="#modalMantenedor" onclick="limpiarFormPac()">
                <i class="fas fa-plus me-2"></i>NUEVO
            </button>
        </div>
    </div>

    <div class="card shadow-sm border-0 p-3">
        <div class="table-responsive-scroll">
            <table id="tablaPacientes" class="table table-hover align-middle mb-0 w-100">
                <thead class="bg-light">
                    <tr class="small text-muted text-uppercase">
                        <th>RUT</th>
                        <th>Nombre Completo</th>
                        <th>F. Nacimiento</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in pacientes %}
                    <tr>
                        <td class="fw-bold text-navy-integra">{{ p.rut | formatear_rut }}</td>
                        <td>{{ p.nombre }} {{ p.apellido }}</td>
                        <td>{{ p.fecha_nacimiento }}</td>
                        <td class="text-center">
                            <button class="btn-editar-integra me-1" onclick="editarPac(this)" 
                                data-id="{{ p.id }}" data-rut="{{ p.rut }}" data-nombre="{{ p.nombre }}" 
                                data-apellido="{{ p.apellido }}" data-fecha="{{ p.fecha_nacimiento }}">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-eliminar-integra" onclick="confirmarEliminacion('{{ p.id }}', '{{ p.nombre }} {{ p.apellido }}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    $(document).ready(function() {
        $('#tablaPacientes').DataTable({
            "language": { "url": "//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json" },
            "dom": '<"top"f>rt<"bottom"lp><"clear">'
        });
    });

    function confirmarEliminacion(id, nombre) {
        Swal.fire({
            title: '¿Eliminar Paciente?',
            text: nombre,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'SÍ, ELIMINAR',
            cancelButtonText: 'CANCELAR',
            customClass: { confirmButton: 'btn-integra-confirm', cancelButton: 'btn-eliminar-integra' },
            buttonsStyling: false
        }).then((result) => {
            if (result.isConfirmed) {
                // Lógica de eliminación aquí
            }
        });
    }
</script>
{% endblock %}
