{% extends "base.html" %}
{% block content %}

<h2>Roles</h2>

<a href="{{ url_for('roles.create') }}" class="btn btn-primary">
    ➕ Crear Rol
</a>

<table>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Acciones</th>
    </tr>

    {% for r in roles %}
    <tr>
        <td>{{ r.id }}</td>
        <td>{{ r.nombre }}</td>
        <td>
            <a href="{{ url_for('roles.edit', id=r.id) }}"
               class="btn btn-warning">
               Editar
            </a>

            <a href="{{ url_for('roles.delete', id=r.id) }}"
               class="btn btn-danger"
               onclick="return confirm('¿Eliminar rol?')">
               Eliminar
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
