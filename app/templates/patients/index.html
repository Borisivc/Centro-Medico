{% extends "base.html" %}

{% block content %}

<h1>Pacientes</h1>

<a href="{{ url_for('patients.create') }}">
Nuevo paciente
</a>

<br><br>

<table border="1">

<tr>
<th>ID</th>
<th>RUT</th>
<th>Nombre</th>
<th>Apellido</th>
<th>Email</th>
<th>Fecha nacimiento</th>
</tr>

{% for p in pacientes %}

<tr>
<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
<td>{{ p[4] }}</td>
<td>{{ p[5] }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
