{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="row align-items-center mb-4">
        <div class="col-md-8">
            <h2 class="modal-integra-title text-start m-0">Gestión de Usuarios</h2>
            <p class="text-muted small mb-0 fw-bold text-uppercase">Administración de perfiles</p>
        </div>
        <div class="col-md-4 text-end">
            <button type="button" class="btn-nuevo-integra" data-bs-toggle="modal" data-bs-target="#modalUser" onclick="limpiarForm()">
                <i class="fas fa-plus me-2"></i>NUEVO
            </button>
        </div>
    </div>

    <div class="card shadow-sm border-0 p-3">
        <div class="table-responsive-scroll">
            <table id="tablaUsuarios" class="table table-hover align-middle mb-0 w-100">
                <thead class="bg-light">
                    <tr class="small text-muted text-uppercase">
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in usuarios %}
                    <tr>
                        <td class="fw-bold text-navy-integra">{{ u.nombre }}</td>
                        <td>{{ u.email }}</td>
                        <td><span class="badge bg-light text-navy-integra border">{{ u.roles_nombres }}</span></td>
                        <td>
                            {% if u.activo %}
                                <span class="badge bg-success-light text-success px-3">ACTIVO</span>
                            {% else %}
                                <span class="badge bg-danger-light text-danger px-3">INACTIVO</span>
                            {% endif %}
                        </td>
                        <td class="text-center">
                            <button class="btn-editar-integra me-1" onclick="prepararEdicion(this)" data-id="{{ u.id }}">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-eliminar-integra" onclick="confirmarEliminacion('{{ u.id }}', '{{ u.nombre }}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    $(document).ready(function() {
        $('#tablaUsuarios').DataTable({
            "language": { "url": "//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json" },
            "dom": '<"top"f>rt<"bottom"lp><"clear">'
        });
    });

    function confirmarEliminacion(id, nombre) {
        Swal.fire({
            title: '¿Eliminar Usuario?',
            text: nombre,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'SÍ, ELIMINAR',
            cancelButtonText: 'CANCELAR',
            customClass: { confirmButton: 'btn-integra-confirm', cancelButton: 'btn-eliminar-integra' },
            buttonsStyling: false
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = "{{ url_for('users.index') }}delete/" + id;
            }
        });
    }
</script>
{% endblock %}
