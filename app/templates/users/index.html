{% extends "base.html" %}
{% block content %}

<h2>Usuarios</h2>

<a href="{{ url_for('users.create') }}" class="btn btn-primary">
    ➕ Crear Usuario
</a>

<table>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Email</th>
        <th>Acciones</th>
    </tr>

    {% for u in usuarios %}
    <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.nombre }}</td>
        <td>{{ u.email }}</td>
        <td>
            <a href="{{ url_for('users.edit', id=u.id) }}"
               class="btn btn-warning">Editar</a>

            <a href="{{ url_for('users.delete', id=u.id) }}"
               class="btn btn-danger"
               onclick="return confirm('¿Eliminar usuario?')">
               Eliminar
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
