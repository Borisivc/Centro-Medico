{% extends "base.html" %}

{% block content %}

<h2>Editar Usuario</h2>

<form method="POST">

    <label>Nombre:</label><br>
    <input type="text" name="nombre" value="{{ usuario[1] }}" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" value="{{ usuario[2] }}" required><br><br>

    <button type="submit">Actualizar</button>

</form>

<br>
<a href="{{ url_for('users.index') }}">⬅ Volver</a>

{% endblock %}
