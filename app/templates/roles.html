{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold m-0 header-navy">Roles de Sistema</h3>
            <p class="text-muted small mb-0">Definición de perfiles y permisos</p>
        </div>
    </div>

    <div class="table-container-scroll shadow-sm bg-white">
        <table class="table table-integra align-middle mb-0">
            <thead>
                <tr>
                    <th class="ps-4">ID</th>
                    <th>Nombre del Rol</th>
                    <th class="text-center">Estado</th>
                </tr>
            </thead>
            <tbody>
                {% for r in roles %}
                <tr>
                    <td class="ps-4 text-muted small">#{{ r.id }}</td>
                    <td><span class="fw-bold text-uppercase">{{ r.nombre }}</span></td>
                    <td class="text-center">
                        <span class="badge bg-success rounded-pill px-3">Activo</span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
