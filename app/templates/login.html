{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-4">

<h4 class="mb-3">Iniciar sesión</h4>

<form method="POST">

<div class="mb-3">

<input
type="email"
name="email"
class="form-control"
placeholder="Correo electrónico del usuario"
required>

</div>

<div class="mb-3">

<input
type="password"
name="password"
class="form-control"
placeholder="Contraseña del usuario"
required>

</div>

<button class="btn btn-primary w-100">
Ingresar
</button>

</form>

</div>

</div>

{% endblock %}
