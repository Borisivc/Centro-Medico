{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="row align-items-center mb-4">
        <div class="col-md-8 text-start">
            <h2 class="modal-integra-title m-0">Gestión de Estados</h2>
            <p class="text-muted small mb-0 fw-bold text-uppercase">Configuración de etiquetas de sistema</p>
        </div>
        <div class="col-md-4 text-end">
            <button type="button" class="btn-nuevo-integra" data-bs-toggle="modal" data-bs-target="#modalStates" onclick="nuevoEstado()">
                <i class="fas fa-info-circle me-2"></i>NUEVO
            </button>
        </div>
    </div>

    <div class="card border-0 shadow-sm p-3">
        <div class="table-responsive-scroll">
            <table id="tablaEstados" class="table table-hover align-middle mb-0 w-100">
                <thead>
                    <tr class="small text-muted text-uppercase">
                        <th>ID</th>
                        <th>Descripción del Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for e in estados %}
                    <tr>
                        <td class="text-muted small">#{{ e[0] }}</td>
                        <td class="fw-bold text-navy-integra text-uppercase">{{ e[1] }}</td>
                        <td class="text-center">
                            <button class="btn-editar-integra me-1" onclick="editarEstado('{{ e[0] }}', '{{ e[1] }}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <form action="{{ url_for('states.delete', id=e[0]) }}" method="POST" class="d-inline">
                                <button type="submit" class="btn-eliminar-integra"><i class="fas fa-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalStates" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0">
            <div class="modal-body p-4">
                <h5 class="modal-integra-title" id="mTitle">CONFIGURAR ESTADO</h5>
                <form action="{{ url_for('states.save') }}" method="POST" id="formStates">
                    <input type="hidden" name="id" id="est_id">
                    <div class="mb-4">
                        <label class="label-integra">Nombre del Estado *</label>
                        <input type="text" name="nombre" id="est_nombre" class="form-control form-control-integra text-uppercase" required>
                    </div>
                    <button type="submit" class="btn-integra-confirm">GUARDAR ESTADO</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    $(document).ready(function() {
        $('#tablaEstados').DataTable({ "language": { "url": "//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json" } });
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for category, message in messages %}
                Swal.fire({ title: 'Sistema Integra', text: "{{ message }}", icon: "{{ 'success' if category == 'success' else 'error' if category == 'danger' else 'warning' }}", customClass: { confirmButton: 'btn-integra-confirm' }, buttonsStyling: false });
            {% endfor %}{% endif %}
        {% endwith %}
    });

    function nuevoEstado() {
        document.getElementById('formStates').reset();
        document.getElementById('est_id').value = '';
        document.getElementById('mTitle').innerText = 'NUEVO ESTADO';
    }

    function editarEstado(id, nombre) {
        document.getElementById('est_id').value = id;
        document.getElementById('est_nombre').value = nombre;
        document.getElementById('mTitle').innerText = 'EDITAR ESTADO';
        bootstrap.Modal.getOrCreateInstance(document.getElementById('modalStates')).show();
    }
</script>
{% endblock %}
