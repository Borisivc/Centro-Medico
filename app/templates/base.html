<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Sistema Centro Médico</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    margin:0;
    background:#f5f6fa;
}

/* NAVBAR */

.navbar{
    background:#e9ecef;
    padding:15px 30px;
    border-top:5px solid #2e7d32;
}

.navbar a{
    text-decoration:none;
    margin-right:20px;
    color:#2c3e50;
    font-weight:bold;
}

.navbar a:hover{
    color:#0d6efd;
}

/* CONTENIDO */

.container{
    padding:30px;
}

/* TARJETAS DASHBOARD */

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0px 2px 8px rgba(0,0,0,0.1);
    max-width:500px;
}

/* TABLAS */

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th{
    background:#2c3e50;
    color:white;
    padding:10px;
}

table td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

/* BOTONES */

.btn{
    padding:6px 10px;
    text-decoration:none;
    border-radius:4px;
    font-size:14px;
}

.btn-primary{
    background:#0d6efd;
    color:white;
}

.btn-warning{
    background:#f39c12;
    color:white;
}

.btn-danger{
    background:#e74c3c;
    color:white;
}

/* MENSAJES */

.flash{
    background:#27ae60;
    color:white;
    padding:10px;
    border-radius:5px;
    margin-bottom:20px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<a href="{{ url_for('routes.dashboard') }}">🏠 Dashboard</a>

<a href="{{ url_for('patients.index') }}">Pacientes</a>

<a href="{{ url_for('professionals.index') }}">Profesionales</a>

<a href="{{ url_for('users.index') }}">Usuarios</a>

<a href="{{ url_for('roles.index') }}">Roles</a>

<a href="{{ url_for('auth.logout') }}">Cerrar sesión</a>

</div>


<div class="container">

{% with messages = get_flashed_messages() %}
{% if messages %}

{% for m in messages %}
<div class="flash">{{ m }}</div>
{% endfor %}

{% endif %}
{% endwith %}

{% block content %}{% endblock %}

</div>

</body>
</html>
