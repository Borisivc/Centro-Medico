{% extends "base.html" %}

{% block content %}

<h3 class="mb-4">
Bienvenido, {{ session['user_nombre'] }}
</h3>

<div class="row">

<div class="col-md-3">
<div class="card card-dashboard bg-primary text-white">
<div class="card-body">
<h5>Pacientes</h5>
<h2>{{ total_pacientes }}</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card card-dashboard bg-success text-white">
<div class="card-body">
<h5>Profesionales</h5>
<h2>{{ total_profesionales }}</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card card-dashboard bg-warning text-white">
<div class="card-body">
<h5>Usuarios</h5>
<h2>{{ total_usuarios }}</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card card-dashboard bg-info text-white">
<div class="card-body">
<h5>Roles</h5>
<h2>{{ total_roles }}</h2>
</div>
</div>
</div>

</div>

{% endblock %}
