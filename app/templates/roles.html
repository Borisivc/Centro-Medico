{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h3>Roles del Sistema</h3>

<table class="table table-bordered">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Nombre</th>
</tr>

</thead>

<tbody>

{% for r in roles %}

<tr>

<td>{{r["id"]}}</td>
<td>{{r["nombre"]}}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
